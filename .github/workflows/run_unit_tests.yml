name: PR Checks
on:
  push:
    branches: [main, stable, release_*]
  pull_request:
    branches: [main, stable, release_*]
  workflow_dispatch:
jobs:
  # Derive the list of nox sessions so each can run as its own matrix leg (and its
  # own named check), instead of lumping every session into a single opaque log.
  discover:
    name: Discover sessions
    runs-on: ubuntu-latest
    outputs:
      sessions: ${{ steps.list.outputs.sessions }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install nox
        run: pip install nox uv
      - name: List nox sessions
        id: list
        run: |
          sessions=$(nox -l --json | python3 -c 'import sys, json; print(json.dumps([s["session"] for s in json.load(sys.stdin)]))')
          echo "sessions=$sessions" >> "$GITHUB_OUTPUT"
  unit_tests:
    name: ${{ matrix.session }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        session: ${{ fromJSON(needs.discover.outputs.sessions) }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.11
            3.13
      - name: Install nox
        run: pip install nox uv
      - name: Run nox session
        run: nox -s "${{ matrix.session }}"
  # Single stable check name for branch protection: green only if every session passed.
  unit_tests_gate:
    name: Unit Tests
    needs: unit_tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all sessions passed
        run: |
          if [ "${{ needs.unit_tests.result }}" != "success" ]; then
            echo "One or more nox sessions failed (aggregate result: ${{ needs.unit_tests.result }})."
            exit 1
          fi
          echo "All nox sessions passed."
  code_style:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: 3.11
      - name: Install nox
        run: pip install nox uv
      - name: Check code with ruff
        run: nox -s code_style
  check_todos:
    name: Check "TODO" Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check "TODO" differences
        id: todo-diff
        uses: ./.github/actions/todo-diff
        with:
          base-ref: ${{ github.event.pull_request.base.sha }}
          head-ref: ${{ github.sha }}
      - name: Comment on PR with "TODO" changes
        if: steps.todo-diff.outputs.has-changes == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const summary = `${{ steps.todo-diff.outputs.summary }}`;
            const details = ${{ steps.todo-diff.outputs.details }};

            let commentBody = `## 📝 "TODO" Changes Detected\n\n**Summary:** ${summary}\n\n`;

            if (details.added && details.added.length > 0) {
              commentBody += `### ➕ Added "TODO"s (${details.added.length})\n`;
              for (const todo of details.added) {
                commentBody += `- \`${todo.file_path}:${todo.line_number}\`: ${todo.content}\n`;
              }
              commentBody += '\n';
            }

            if (details.removed && details.removed.length > 0) {
              commentBody += `### ✅ Removed "TODO"s (${details.removed.length})\n`;
              for (const todo of details.removed) {
                commentBody += `- \`${todo.file_path}:${todo.line_number}\`: ${todo.content}\n`;
              }
              commentBody += '\n';
            }

            if (details.modified && details.modified.length > 0) {
              commentBody += `### 📝 Modified "TODO"s (${details.modified.length})\n`;
              for (const todo of details.modified) {
                commentBody += `- \`${todo.file_path}:${todo.line_number}\`:\n`;
                commentBody += `  - **Before:** ${todo.old_content}\n`;
                commentBody += `  - **After:** ${todo.new_content}\n`;
              }
              commentBody += '\n';
            }

            commentBody += '---\n*This comment is automatically updated when "TODO" changes are detected.*';

            // Find existing TODO comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.data.find(comment =>
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('📝 "TODO" Changes Detected')
            );

            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
  docs-build:
    name: Documentation Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install nox and uv
        run: pip install nox uv
      - name: Build documentation
        run: nox -s docs
